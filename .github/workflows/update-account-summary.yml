
name: Update account summary

on:
  schedule:
    - cron: '0 * * * 1-5'  # every hour, Mon–Fri UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch account summary SVG
        run: |
          mkdir -p assets
          curl -f -o assets/account-summary.svg \
            "https://github-pretty-readme.azurewebsites.net/account-summary?username=kevinthelago&background=cherry-blossom"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/account-summary.svg
          git diff --staged --quiet || (git commit -m "chore: update account summary" && git push)
